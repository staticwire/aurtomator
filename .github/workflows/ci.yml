name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: shellcheck
        run: shellcheck -x -S warning scripts/*.sh strategies/*.sh

      - name: shfmt
        run: shfmt -d -i 2 -ci scripts/*.sh strategies/*.sh

  test:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    timeout-minutes: 15
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed bash bats git go-yq curl openssh ruby ruby-erb
          gem install bashcov simplecov-cobertura --no-document
          echo "$(ruby -e 'puts Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate package configs
        run: ./scripts/validate-pkg.sh --all

      - name: Run BATS tests
        run: bats tests/ --recursive

      - name: Generate coverage
        run: |
          bashcov -- bats tests/ --recursive 2>&1 || true
          # Fix absolute paths in Cobertura XML so Codecov can match files
          if [ -f coverage/coverage.xml ]; then
            sed -i "s|<source>.*</source>|<source>.</source>|g" coverage/coverage.xml
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage/coverage.xml
          fail_ci_if_error: false
